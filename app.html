<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Diary Generator</title>
    <!-- Use SheetJS for reading/writing Excel files in browser -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f9fafb;
            --text-color: #111827;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
        }

        .instructions {
            color: #4b5563;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .button:hover {
            background-color: var(--primary-hover);
        }

        .button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        #statusBox {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }

        .status-error {
            background-color: #fee2e2;
            color: var(--error-color);
            border: 1px solid #f87171;
            display: block !important;
        }

        .status-success {
            background-color: #d1fae5;
            color: var(--success-color);
            border: 1px solid #34d399;
            display: block !important;
        }
        
        .status-loading {
            background-color: #e0e7ff;
            color: var(--primary-color);
            border: 1px solid #818cf8;
            display: block !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Diary Generator</h1>
    <p class="instructions">
        Generate a daily diary aggregated dataset from observational data.<br>
        Run entirely in your browser — no data is sent to any server.
    </p>

    <div class="form-group">
        <label for="detailedFile">1. Detailed Diary Excel File (*)</label>
        <input type="file" id="detailedFile" accept=".xlsx, .xls">
    </div>

    <div class="form-group">
        <label for="metadataFile">2. Metadata Excel File (*)</label>
        <input type="file" id="metadataFile" accept=".xlsx, .xls">
    </div>

    <div class="form-group">
        <label for="country">Country</label>
        <input type="text" id="country" placeholder="e.g. Portugal">
    </div>

    <div class="form-group">
        <label for="group">Group</label>
        <input type="text" id="group" placeholder="e.g. A">
    </div>

    <button id="generateBtn" class="button" onclick="generateAndDownload()">Generate Daily Diary Excel</button>

    <div id="statusBox"></div>
</div>

<script>
    // Behavior mapping logic based on detailed specifications
    
    const BEHAVIOR_MAP = {
        'aggression': 'total number of daily aggression of the dyad',
        'social play interaction': 'total number of daily social play interaction of the dyad',
        'social play with body contact': 'total number of social play with body contact of the dyad',
        'social play without body contact': 'total number of social play without body contact of the dyad',
        'social play with object': 'total number of social play with object of the dyad',
        'social play without object': 'total number of social play without object of the dyad',
        'play fighting': 'total number of play fighting of the dyad',
        'locomotor/acrobatic play': 'total number of locomotor/acrobatic play of the dyad',
        'tickle': 'total number of tickle of the dyad',
        'other': 'total number of other of the dyad',
        'body contact': 'total number of body contact interactions of dyad',
        'food sharing': 'total number of food sharing of dyad',
        'other affiliation': 'total number of other affiliation of dyad',
        
        // Solitary
        'solitary play': 'total number of daily solitary play of child',
        'solitary play with object': 'total number of solitary play with object',
        'solitary play without object': 'total number of solitary play without object'
    };
    
    const AGGREGATION_COLUMNS = [
        'total number of daily aggression of the dyad',
        'total number of daily social play interaction of the dyad',
        'total number of social play with body contact of the dyad',
        'total number of social play without body contact of the dyad',
        'total number of social play with object of the dyad',
        'total number of social play without object of the dyad',
        'total number of play fighting of the dyad',
        'total number of locomotor/acrobatic play of the dyad',
        'total number of tickle of the dyad',
        'total number of other of the dyad',
        'total number of daily solitary play of child',
        'total number of solitary play with object',
        'total number of solitary play without object',
        'total number of body contact interactions of dyad',
        'total number of food sharing of dyad',
        'total number of other affiliation of dyad'
    ];

    const EXPECTED_OUTPUT_ORDER = [
        "date", "actor", "receiver", "dyad (AB is different from BA)", 
        "actor sex (male=0, female=1)", "receiver sex (male=0, female=1)", 
        "actor age (months)", "receiver age (months)", 
        "kinship (no kin=0, siblings =1, other kinship relation (cousins) = 2) if you do not have data NA (not applicable)",
        "daily observation minutes of actor (from scan)", "daily observation minutes of receiver (from scan)", 
        "daily observation minutes for dyad (from scan)",
        ...AGGREGATION_COLUMNS,
        "country", "group", "note"
    ];

    function setStatus(msg, type) {
        const box = document.getElementById('statusBox');
        box.className = '';
        box.classList.add('status-' + type);
        box.innerText = msg;
    }
    
    function parseDate(val) {
        if (!val) return null;
        if (val instanceof Date) return val;
        if (typeof val === 'number') {
            return new Date(Math.round((val - 25569) * 86400 * 1000));
        }
        let str = String(val).trim();
        // Try DD/MM/YYYY
        let parts = str.split('/');
        if (parts.length === 3) {
            let d = parseInt(parts[0], 10);
            let m = parseInt(parts[1], 10) - 1;
            let y = parseInt(parts[2], 10);
            return new Date(y, m, d);
        }
        // Try YYYY-MM-DD
        parts = str.split('-');
        if (parts.length === 3) {
            return new Date(str);
        }
        let d = new Date(val);
        return isNaN(d.getTime()) ? null : d;
    }

    function formatExcelDate(val) {
        if (!val) return "";
        let d = parseDate(val);
        if (!d) return String(val);
        let dd = String(d.getDate()).padStart(2, '0');
        let mm = String(d.getMonth() + 1).padStart(2, '0');
        let yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
    }
    
    const REFERENCE_DATE = "13/10/2025";
    
    function calculateAgeMonths(birthDateStr) {
        const b = parseDate(birthDateStr);
        const e = parseDate(REFERENCE_DATE);
        if (!b || !e) return "";
        
        let months = (e.getFullYear() - b.getFullYear()) * 12 + (e.getMonth() - b.getMonth());
        if (e.getDate() < b.getDate()) {
            months--;
        }
        return months >= 0 ? months : 0;
    }
    
    function durationToSeconds(val) {
        if (val === undefined || val === null || val === "" || val === 0) return 0;
        
        if (typeof val === 'number') {
            // Excel serial time: 1.0 = 24 hours. 
            // Most interaction durations are short (e.g., < 1 hour = 0.0416).
            // If val is > 1.0, it's likely raw seconds or minutes.
            if (val < 1.0) {
                return Math.round(val * 86400);
            }
            // If it's a large integer, assume seconds. 
            // If it's something like 16.20, it's ambiguous, but let's treat as seconds for now.
            return Math.round(val);
        }
        
        let str = String(val).trim().replace(',', '.'); // Handle commas too
        if (!str) return 0;
        
        // Handle min.sec or HH.MM.SS (using dot or colon)
        let separator = str.includes(':') ? ':' : (str.includes('.') ? '.' : null);
        
        if (separator) {
            let parts = str.split(separator).map(p => {
                let n = parseInt(p, 10);
                return isNaN(n) ? 0 : n;
            });
            
            if (parts.length === 2) {
                // min:sec or HH:MM
                return parts[0] * 60 + parts[1];
            } else if (parts.length === 3) {
                // hh:mm:ss
                return parts[0] * 3600 + parts[1] * 60 + parts[2];
            }
        }
        
        // Try parsing as a plain number (seconds)
        let n = parseFloat(str);
        return isNaN(n) ? 0 : Math.round(n);
    }

    function formatSeconds(totalSeconds) {
        if (!totalSeconds) return "00:00";
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function parseExcelMetadata(ws) {
        // Use raw values to get Excel serial dates if any
        const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
        const metadataMap = {}; // Key: name or code (converted to string lower)
        
        json.forEach(row => {
            let code = null, name = null, sex = null, birth = null;
            for(let key in row) {
                const kLower = key.toLowerCase();
                const val = row[key];
                
                if(kLower.includes('code') || kLower === 'id' || kLower === 'subject') code = String(val).trim().toLowerCase();
                if(kLower === 'name' || kLower === 'nº') name = String(val).trim().toLowerCase();
                if((kLower === 'sex' || kLower === 'gender') && val !== "") sex = String(val).trim().toLowerCase();
                if((kLower.includes('birth') || kLower.includes('dob') || kLower.includes('nascimento')) && val !== "") birth = val;
            }
            
            let sexEncoded = "";
            if(sex === 'm' || sex === 'male') sexEncoded = 0;
            if(sex === 'f' || sex === 'female') sexEncoded = 1;
            
            const meta = { sex: sexEncoded, birth: birth };
            if (code) metadataMap[code] = meta;
            if (name) metadataMap[name] = meta;
        });
        return metadataMap;
    }

    async function generateAndDownload() {
        const detInput = document.getElementById('detailedFile');
        const metaInput = document.getElementById('metadataFile');
        const country = document.getElementById('country').value.trim();
        const group = document.getElementById('group').value.trim();

        if (!detInput.files.length) {
            return setStatus("Error: Please select the Detailed Diary Excel file.", "error");
        }
        if (!metaInput.files.length) {
            return setStatus("Error: Please select the Metadata Excel file.", "error");
        }

        setStatus("Processing data...", "loading");
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;

        try {
            // Read metadata
            let file = metaInput.files[0];
            let data = await file.arrayBuffer();
            let workbook = XLSX.read(data, {cellDates: false});
            let metadataMap = parseExcelMetadata(workbook.Sheets[workbook.SheetNames[0]]);

            // Read detailed
            file = detInput.files[0];
            data = await file.arrayBuffer();
            workbook = XLSX.read(data, {cellDates: false});
            const rawDiary = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });

            // Group data by Date, Actor, Receiver
            const grouped = {};
            // Track solitary explicitly for each child/day
            const solitaryData = {}; 

            rawDiary.forEach(row => {
                let date=null, actor=null, receiver=null, kinship="";
                let bPrimary="", bContact="", bObject="", bType="";
                let duration="";
                
                // Track if any cell in this row explicitly has "solitary" 
                let hasSolitaryText = false;
                
                for(let key in row) {
                    const kL = key.toLowerCase().trim();
                    const val = row[key];
                    if (val === "") continue;
                    
                    const strVal = String(val).trim();
                    if (strVal.toLowerCase() === 'solitary' || strVal.toLowerCase() === 'solpl') {
                        hasSolitaryText = true;
                    }
                    
                    if(kL.startsWith('date') || kL.startsWith('data')) date = val;
                    else if(kL.startsWith('actor') && !kL.includes('minute') && !kL.includes('sex') && !kL.includes('age')) actor = strVal;
                    else if(kL.startsWith('receiver') && !kL.includes('minute') && !kL.includes('sex') && !kL.includes('age')) receiver = strVal;
                    else if(kL === 'duration') duration = val; // Exact match priority
                    else if(!duration && (kL.includes('duration') || kL.includes('minute'))) duration = val;
                    else if(kL === 'kinship') kinship = strVal;
                    else if(kL.includes('target behav') || kL.includes('behaviour')) bPrimary = strVal.toLowerCase();
                    else if(kL.startsWith('c ') || kL.startsWith('c=')) bContact = strVal.toUpperCase();
                    else if(kL.startsWith('ob ') || kL.startsWith('ob=')) bObject = strVal.toUpperCase();
                    else if(kL.startsWith('pf ') || kL.startsWith('pf=')) bType = strVal.toUpperCase();
                }

                if(!date || !actor) return; // Skip invalid rows
                
                let isSolitary = (bPrimary === 'solpl' || bPrimary.includes('solitary') || hasSolitaryText);
                const seconds = durationToSeconds(duration);
                // Preserve original date string if it's already a formatted string, otherwise format it
                const formattedDate = (typeof date === 'string' && date.includes('/')) ? date : formatExcelDate(date);

                if (isSolitary) {
                    const rKey = formattedDate + "_" + actor;
                    if (!solitaryData[rKey]) {
                        solitaryData[rKey] = {
                            date: formattedDate, actor, durationSeconds: 0, kinship, counts: {}
                        };
                        AGGREGATION_COLUMNS.forEach(c => solitaryData[rKey].counts[c] = 0);
                    }
                    
                    solitaryData[rKey].durationSeconds += seconds;
                    
                    let cRef = solitaryData[rKey].counts;
                    let cTot = 'total number of daily solitary play of child';
                    cRef[cTot] += 1;
                    
                    if(bObject === 'OB') {
                        let col = 'total number of solitary play with object';
                        cRef[col] += 1;
                    } else if(bObject === 'NOB' || bObject === 'NC') { // Handle NOB or potential mislabels
                        let col = 'total number of solitary play without object';
                        cRef[col] += 1;
                    }
                } else if (receiver && receiver.toLowerCase() !== 'na' && receiver !== '') {
                    // Dyadic interaction
                    const k1 = formattedDate + "_" + actor + "_" + receiver;
                    if (!grouped[k1]) {
                        grouped[k1] = {
                            date: formattedDate, actor, receiver, durationSeconds: 0, kinship, counts: {}
                        };
                        AGGREGATION_COLUMNS.forEach(c => grouped[k1].counts[c] = 0);
                    }
                    
                    grouped[k1].durationSeconds += seconds;
                    
                    let cRef = grouped[k1].counts;
                    
                    if(bPrimary === 'ag' || bPrimary.includes('aggression')) {
                        let col = 'total number of daily aggression of the dyad';
                        cRef[col] += 1;
                    } else if(bPrimary === 'bc' || bPrimary.includes('body contact')) {
                        let col = 'total number of body contact interactions of dyad';
                        cRef[col] += 1;
                    } else if(bPrimary === 'fs' || bPrimary.includes('food sharing')) {
                        let col = 'total number of food sharing of dyad';
                        cRef[col] += 1;
                    } else if(bPrimary === 'aff' || bPrimary.includes('affiliation') || 
                              bPrimary.includes('embrace') || bPrimary.includes('caress') || 
                              bPrimary.includes('consolatory')) {
                        let col = 'total number of other affiliation of dyad';
                        cRef[col] += 1;
                    } else if(bPrimary === 'socpl' || bPrimary.includes('social play')) {
                        let col = 'total number of daily social play interaction of the dyad';
                        cRef[col] += 1;
                        
                        if(bContact === 'C') {
                            let c1 = 'total number of social play with body contact of the dyad';
                            cRef[c1] += 1;
                        } else if(bContact === 'NC') {
                            let c1 = 'total number of social play without body contact of the dyad';
                            cRef[c1] += 1;
                        }
                        
                        if(bObject === 'OB') {
                            let c1 = 'total number of social play with object of the dyad';
                            cRef[c1] += 1;
                        } else if(bObject === 'NOB') {
                            let c1 = 'total number of social play without object of the dyad';
                            cRef[c1] += 1;
                        }
                        
                        if(bType === 'PF') {
                            let c1 = 'total number of play fighting of the dyad';
                            cRef[c1] += 1;
                        } else if(bType === 'L') {
                            let c1 = 'total number of locomotor/acrobatic play of the dyad';
                            cRef[c1] += 1;
                        } else if(bType === 'TK') {
                            let c1 = 'total number of tickle of the dyad';
                            cRef[c1] += 1;
                        } else if(bType === 'O') {
                            let c1 = 'total number of other of the dyad';
                            cRef[c1] += 1;
                        }
                    }
                }
            });

            // Format Output Rows
            const dyadicRows = [];
            const solitaryRows = [];
            
            // Build dyadic rows first
            for (let key in grouped) {
                let item = grouped[key];
                
                let theDuration = item.duration;

                let metaA = metadataMap[item.actor.toLowerCase()] || {};
                let metaR = metadataMap[item.receiver.toLowerCase()] || {};

                let aAge = calculateAgeMonths(metaA.birth);
                let rAge = calculateAgeMonths(metaR.birth);

                let rowOut = {};
                rowOut["date"] = item.date;
                rowOut["actor"] = item.actor;
                rowOut["receiver"] = item.receiver;
                rowOut["dyad (AB is different from BA)"] = item.actor + "-" + item.receiver;
                rowOut["actor sex (male=0, female=1)"] = metaA.sex !== undefined ? metaA.sex : "";
                rowOut["receiver sex (male=0, female=1)"] = metaR.sex !== undefined ? metaR.sex : "";
                rowOut["actor age (months)"] = aAge;
                rowOut["receiver age (months)"] = rAge;
                rowOut["kinship (no kin=0, siblings =1, other kinship relation (cousins) = 2) if you do not have data NA (not applicable)"] = item.kinship || "NA";
                
                const timeStr = formatSeconds(item.durationSeconds);
                rowOut["daily observation minutes of actor (from scan)"] = timeStr;
                rowOut["daily observation minutes of receiver (from scan)"] = timeStr;
                rowOut["daily observation minutes for dyad (from scan)"] = timeStr;

                AGGREGATION_COLUMNS.forEach(c => rowOut[c] = item.counts[c]);
                
                rowOut["country"] = country;
                rowOut["group"] = group;
                rowOut["note"] = "";

                dyadicRows.push(rowOut);
            }

            // Build solitary rows
            for (let key in solitaryData) {
                let item = solitaryData[key];
                
                let theDuration = item.duration;
                let metaA = metadataMap[item.actor.toLowerCase()] || {};
                let aAge = calculateAgeMonths(metaA.birth);

                let rowOut = {};
                rowOut["date"] = item.date;
                rowOut["actor"] = item.actor;
                rowOut["receiver"] = "";
                rowOut["dyad (AB is different from BA)"] = ""; // Solitary has blank dyad
                rowOut["actor sex (male=0, female=1)"] = metaA.sex !== undefined ? metaA.sex : "";
                rowOut["receiver sex (male=0, female=1)"] = "";
                rowOut["actor age (months)"] = aAge;
                rowOut["receiver age (months)"] = "";
                rowOut["kinship (no kin=0, siblings =1, other kinship relation (cousins) = 2) if you do not have data NA (not applicable)"] = item.kinship || "NA";
                
                const timeStr = formatSeconds(item.durationSeconds);
                rowOut["daily observation minutes of actor (from scan)"] = timeStr;
                rowOut["daily observation minutes of receiver (from scan)"] = timeStr;
                rowOut["daily observation minutes for dyad (from scan)"] = timeStr;

                AGGREGATION_COLUMNS.forEach(c => rowOut[c] = item.counts[c]);
                
                rowOut["country"] = country;
                rowOut["group"] = group;
                rowOut["note"] = "";

                solitaryRows.push(rowOut);
            }

            // Sort dyadic rows by date, then actor
            dyadicRows.sort((a,b) => {
                if (a.date !== b.date) return (a.date > b.date ? 1 : -1);
                if (a.actor !== b.actor) return (a.actor > b.actor ? 1 : -1);
                return (a.receiver > b.receiver ? 1 : -1);
            });
            
            // Sort solitary rows by date, then actor
            solitaryRows.sort((a,b) => {
                if (a.date !== b.date) return (a.date > b.date ? 1 : -1);
                return (a.actor > b.actor ? 1 : -1);
            });
            
            // Combine with solitary rows always at the end
            const outputRows = [...dyadicRows, ...solitaryRows];

            // Enforce exact column order
            const finalSheetData = [EXPECTED_OUTPUT_ORDER]; // Header row
            outputRows.forEach(r => {
                const arr = EXPECTED_OUTPUT_ORDER.map(col => r[col] !== undefined ? r[col] : "");
                finalSheetData.push(arr);
            });

            // Export to Excel
            const newWb = XLSX.utils.book_new();
            const newWs = XLSX.utils.aoa_to_sheet(finalSheetData);
            XLSX.utils.book_append_sheet(newWb, newWs, "Daily Diary");
            XLSX.writeFile(newWb, "daily_diary.xlsx");

            setStatus("Success! The daily_diary.xlsx file has been generated and downloaded.", "success");
        } catch(err) {
            console.error(err);
            setStatus("An error occurred during processing: " + err.message, "error");
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
